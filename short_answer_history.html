<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Short Answer History</title>
    <link rel="stylesheet" href="short_answer_history.css">
</head>
<body>
    <main class="page">
        <div class="page-nav">
            <a class="back-home-btn" href="index.html" aria-label="Go back to home page">Back Home</a>
        </div>

        <header class="hero">
            <h1>Short Answer History</h1>
            <p>Review your typed answers, scores, and per-question results.</p>
        </header>

        <section class="card">
            <div class="controls">
                <span id="status" class="status">Loading attempts...</span>
                <button id="refresh-btn" type="button" class="secondary">Refresh</button>
            </div>
            <div id="attempts" class="attempts"></div>
        </section>
    </main>

    <script src="short_answer_history.js"></script>
