<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Take Quiz</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #c9cfdd;
            color: #111827;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 36px 16px;
        }

        .page-nav {
            margin-bottom: 14px;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: #f5f6fa;
            color: #111827;
            border: 1px solid #c7ccda;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
        }

        .back-home-btn:hover {
            background: #eceff6;
        }

        .card {
            background: #f3f3f3;
            border: 1px solid #d7d9df;
            border-radius: 16px;
            padding: 22px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            color: #4b5563;
            font-size: 14px;
        }

        .question {
            font-size: 24px;
            font-weight: 700;
            margin: 10px 0 16px;
        }

        input[type="text"] {
            width: 100%;
            border: 1px solid #cdd3de;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .primary {
            background: #0f172a;
            color: #fff;
        }

        .secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .message {
            margin-top: 12px;
            min-height: 22px;
            color: #1f2937;
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="page-nav">
            <a class="back-home-btn" href="index.html" aria-label="Go back to home page">Back Home</a>
        </div>

        <div class="card">
            <div class="top">
                <span id="progress">Question 0 of 0</span>
                <span id="score">Score: 0</span>
            </div>
            <h1 class="question" id="question-text">Loading...</h1>
            <input id="answer-input" type="text" placeholder="Type your answer..." />
            <div class="actions">
                <button class="primary" id="submit-btn" type="button">Submit</button>
                <button class="secondary" id="next-btn" type="button" disabled>Next</button>
                <button class="secondary" id="back-btn" type="button">Back</button>
            </div>
            <div class="message" id="message"></div>
        </div>
    </main>

    <script src="question_answer.js"></script>
</body>
</html>
