<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="Style.css" />
        <link rel="stylesheet" href="loginStyle.css" />
        <title>Sign Up</title>
    </head>
    <body>
        <main class="center-container">
            <section id="login-container">
                <h1 id="login-title">Create Account</h1>
                <p id="login-subtext">Sign up to start your quiz</p>

                <form id="signup-form">
                    <label for="email-signup" class="bold-label login-label">Email</label>
                    <input
                        type="email"
                        id="email-signup"
                        name="email-signup"
                        placeholder="Enter your email"
                        class="login-item"
                        required
                    />

                    <label for="password-signup" class="bold-label login-label">Password</label>
                    <input
                        type="password"
                        id="password-signup"
                        name="password-signup"
                        class="login-item"
                        placeholder="Create a password"
                        required
                    />

                    <label for="confirm-password" class="bold-label login-label">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        class="login-item"
                        placeholder="Re-enter password"
                        required
                    />

                    <input type="submit" value="Sign Up" class="login-item" id="signup-button" />
                </form>

                <p class="login-footer">
                    Already have an account?
                    <a href="login.html">Sign in</a>
                </p>
            </section>
        </main>

        <script>
            (function () {
                const form = document.getElementById('signup-form');
                const msg = document.createElement('div');
                msg.id = 'signup-message';
                msg.style.marginTop = '8px';
                form.parentNode.insertBefore(msg, form.nextSibling);

                async function readErrorMessage(response, fallback) {
                    const text = await response.text();
                    try {
                        const parsed = JSON.parse(text);
                        return parsed.message || fallback;
                    } catch (err) {
                        return text || fallback;
                    }
                }

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    msg.textContent = '';

                    const email = document.getElementById('email-signup').value.trim().toLowerCase();
                    const password = document.getElementById('password-signup').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    if (password.length < 6) {
                        msg.textContent = 'Password must be at least 6 characters';
                        return;
                    }

                    if (password !== confirmPassword) {
                        msg.textContent = 'Passwords do not match';
                        return;
                    }

                    try {
                        const response = await fetch('/api/signup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: email.split('@')[0],
                                email,
                                password
                            })
                        });

                        if (!response.ok) {
                            msg.textContent = await readErrorMessage(response, 'Signup failed');
                            return;
                        }

                        msg.textContent = 'Account created. Redirecting to login...';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 900);
                    } catch (err) {
                        console.error(err);
                        msg.textContent = 'Cannot reach backend. Run `node server.js` and open http://localhost:3000/signup.html';
                    }
                });
            })();
        </script>
    </body>
</html>
