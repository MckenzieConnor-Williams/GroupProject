<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="Style.css" />
        <link rel="stylesheet" href="loginStyle.css" />
        <title>Login</title>
    </head>
    <body>
        <main class="center-container">
            <section id="login-container">
                <h1 id="login-title">Welcome Back</h1>
                <p id="login-subtext">Sign in to start your quiz</p>

                <form id="login-form">
                    <label for="email-login" class="bold-label login-label">Email</label>
                    <input
                        type="email"
                        id="email-login"
                        name="email-login"
                        placeholder="Enter your email"
                        class="login-item"
                        required
                    />

                    <label for="password-login" class="bold-label login-label">Password</label>
                    <input
                        type="password"
                        id="password-login"
                        name="password-login"
                        class="login-item"
                        placeholder="Enter your password"
                        required
                    />

                    <input type="submit" value="Sign In" class="login-item" id="login-button" />
                </form>



                <p class="login-footer">
                    Don't have an account?
                    <a href="signup.html">Sign up</a>
                </p>
            </section>
        </main>
        <script>
            (function () {
                const form = document.getElementById('login-form');
                let msg = document.getElementById('login-message');
                if (!msg) {
                    msg = document.createElement('div');
                    msg.id = 'login-message';
                    msg.style.marginTop = '8px';
                    form.parentNode.insertBefore(msg, form.nextSibling);
                }

                async function readErrorMessage(response, fallback) {
                    const text = await response.text();
                    try {
                        const parsed = JSON.parse(text);
                        return parsed.message || fallback;
                    } catch (err) {
                        return text || fallback;
                    }
                }

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    msg.textContent = 'Checking credentials...';

                    const email = document.getElementById('email-login').value.trim().toLowerCase();
                    const password = document.getElementById('password-login').value;

                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        if (!response.ok) {
                            msg.textContent = await readErrorMessage(response, 'Login failed');
                            return;
                        }

                        const data = await response.json();
                        const displayName = (data.user && data.user.name) || email;
                        localStorage.setItem(
                            'syntaxstudy_current_user',
                            JSON.stringify({
                                name: displayName,
                                email
                            })
                        );
                        msg.textContent = `Welcome, ${displayName}! Redirecting...`;
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                    } catch (err) {
                        console.error(err);
                        msg.textContent = 'Cannot reach backend. Run `node server.js` and open http://localhost:3000/login.html';
                    }
                });
            })();
        </script>
    </body>
</html>
