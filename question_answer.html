<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="question_answer.css" />
    <title>Take Quiz</title>
</head>
<body>
    <main class="page">
        <div class="page-nav">
            <a class="back-home-btn" href="index.html" aria-label="Go back to home page">Back Home</a>
        </div>

        <div class="card">
            <div class="top">
                <span id="progress">Question 0 of 0</span>
                <span id="score">Score: 0</span>
            </div>
            <h1 class="question" id="question-text">Loading...</h1>
            <input id="answer-input" type="text" placeholder="Type your answer..." />
            <div class="actions">
                <button class="primary" id="submit-btn" type="button">Submit</button>
                <button class="secondary" id="next-btn" type="button" disabled>Next</button>
                <button class="secondary" id="back-btn" type="button">Back</button>
            </div>
            <div class="message" id="message"></div>
        </div>
    </main>

    <script src="question_answer.js"></script>
</body>
</html>
